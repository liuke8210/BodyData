<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="健康看板">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>個人健康數據看板</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-50 text-slate-900">
  <div class="min-h-screen md:pl-56">
    <aside
      class="fixed left-0 top-0 z-20 hidden h-screen w-56 flex-col border-r border-slate-200 bg-white px-3 py-4 md:flex">
      <nav class="space-y-1" aria-label="主要導覽">
        <button class="nav-link active w-full rounded-md px-3 py-2 text-left text-sm font-medium" data-view="dashboard"
          type="button">首頁</button>
        <button
          class="nav-link w-full rounded-md px-3 py-2 text-left text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-900"
          data-view="logs" type="button">紀錄</button>
        <button
          class="nav-link w-full rounded-md px-3 py-2 text-left text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-900"
          data-view="settings" type="button">設定</button>
      </nav>
    </aside>

    <header class="border-b border-slate-200 bg-white px-4 py-4 md:px-8">
      <div class="flex items-center justify-between gap-3">
        <div>
          <p class="text-sm text-slate-500">Dashboard</p>
          <h1 class="text-xl font-semibold tracking-normal text-slate-900">個人健康數據看板</h1>
        </div>
        <div class="text-right">
          <p id="currentDate" class="text-sm font-medium text-slate-900"></p>
          <p class="text-xs text-slate-500">僅記錄與視覺化數值</p>
        </div>
      </div>
    </header>

    <main class="px-4 pb-32 pt-5 md:px-8 md:pb-8">
      <section id="dashboardView" class="view space-y-5">
        <div id="dashboardStatus" class="hidden rounded-md border px-4 py-3 text-sm"></div>

        <div class="flex flex-col gap-5 lg:grid lg:grid-cols-[minmax(0,1.65fr)_minmax(280px,0.9fr)] lg:items-start">
          <section class="hidden rounded-lg border border-slate-200 bg-white p-4 lg:col-start-1 lg:row-start-1 lg:block">
            <div class="flex items-start justify-between gap-4">
              <div>
                <h2 class="text-base font-semibold text-slate-900">今日重點摘要</h2>
                <p class="mt-1 text-sm text-slate-500">依最新資料整理需要留意的數值變化</p>
              </div>
              <span class="rounded-md bg-teal-50 px-2 py-1 text-xs font-medium text-teal-700">每日</span>
            </div>
            <div id="dailyInsightSummary" class="mt-4 rounded-md border border-dashed border-slate-200 p-4 text-sm text-slate-500">
              尚未產生今日摘要
            </div>
          </section>

          <section class="grid grid-cols-3 gap-3 lg:col-start-2 lg:row-start-1 lg:grid-cols-2" aria-label="最新數值">
            <article class="rounded-lg border border-slate-200 bg-white p-4 lg:p-3">
              <p class="text-xs font-medium text-slate-500">最新體重</p>
              <div class="mt-2 flex items-end gap-1">
                <span id="latestWeight" class="text-2xl font-semibold lg:text-xl">--</span>
                <span class="pb-1 text-xs text-slate-500">kg</span>
              </div>
              <p id="latestWeightDate" class="mt-2 text-xs text-slate-500">尚無資料</p>
            </article>

            <article class="rounded-lg border border-slate-200 bg-white p-4 lg:p-3">
              <p class="text-xs font-medium text-slate-500">收縮壓</p>
              <div class="mt-2 flex items-end gap-1">
                <span id="latestBpSystolic" class="text-2xl font-semibold lg:text-xl">--</span>
                <span class="pb-1 text-xs text-slate-500">mmHg</span>
              </div>
              <p id="latestBpSystolicDate" class="mt-2 text-xs text-slate-500">尚無資料</p>
            </article>

            <article class="rounded-lg border border-slate-200 bg-white p-4 lg:p-3">
              <p class="text-xs font-medium text-slate-500">舒張壓</p>
              <div class="mt-2 flex items-end gap-1">
                <span id="latestBpDiastolic" class="text-2xl font-semibold lg:text-xl">--</span>
                <span class="pb-1 text-xs text-slate-500">mmHg</span>
              </div>
              <p id="latestBpDiastolicDate" class="mt-2 text-xs text-slate-500">尚無資料</p>
            </article>

            <article class="rounded-lg border border-slate-200 bg-white p-4 lg:p-3">
              <p class="text-xs font-medium text-slate-500">最新 Blast</p>
              <div class="mt-2 flex items-end gap-1">
                <span id="latestBlast" class="text-2xl font-semibold lg:text-xl">--</span>
                <span class="pb-1 text-xs text-slate-500">%</span>
              </div>
              <p id="latestBlastDate" class="mt-2 text-xs text-slate-500">尚無資料</p>
            </article>
          </section>

          <div class="order-1 space-y-5 lg:order-none lg:col-start-2 lg:row-start-2">
            <section class="rounded-lg border border-slate-200 bg-white p-4">
              <label for="quickTodo" class="text-xs font-medium text-slate-500">新增待辦</label>
              <form id="quickTodoForm" class="mt-2 flex gap-2">
                <input id="quickTodo"
                  class="min-w-0 flex-1 rounded-md border border-slate-200 px-3 py-2 text-[16px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10"
                  type="text" placeholder="輸入要追蹤的事項">
                <button
                  class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600/20"
                  type="submit">新增</button>
              </form>
            </section>

            <section class="rounded-lg border border-slate-200 bg-white p-4">
              <div class="mb-3 flex items-center justify-between gap-3">
                <div>
                  <h2 class="text-base font-semibold text-slate-900">任務清單</h2>
                  <span id="todoCount" class="text-xs text-slate-500">0 undone</span>
                </div>
                <button id="deleteDoneTodos"
                  class="rounded-md border border-slate-200 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 disabled:cursor-not-allowed disabled:opacity-50"
                  type="button" disabled>刪除已完成</button>
              </div>
              <ul id="todoList" class="space-y-2"></ul>
              <p id="todoEmptyState"
                class="hidden rounded-md border border-dashed border-slate-200 p-4 text-sm text-slate-500">尚無待辦事項</p>
            </section>
          </div>

          <section class="order-2 rounded-lg border border-slate-200 bg-white p-4 lg:order-none lg:col-start-1 lg:row-start-2">
            <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <h2 class="text-base font-semibold text-slate-900">歷史趨勢圖</h2>
                <p class="text-sm text-slate-500">依指標切換檢視數值變化</p>
              </div>
              <label class="block">
                <span class="sr-only">選擇圖表指標</span>
                <select id="metricSelect"
                  class="w-full rounded-md border border-slate-200 px-3 py-2 text-[16px] text-slate-900 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10 sm:w-56"></select>
              </label>
            </div>
            <div id="chartEmptyState"
              class="hidden rounded-md border border-dashed border-slate-200 p-6 text-center text-sm text-slate-500">
              尚無可用的趨勢資料</div>
            <div id="chartFrame" class="chart-frame">
              <canvas id="trendChart" aria-label="歷史趨勢圖"></canvas>
            </div>
          </section>
        </div>
      </section>

      <section id="logsView" class="view hidden space-y-5">
        <div class="grid gap-5 lg:grid-cols-2">
          <form id="dailyLogForm" class="rounded-lg border border-slate-200 bg-white p-4">
            <h2 class="text-base font-semibold text-slate-900">每日基本紀錄</h2>
            <div class="mt-4 grid grid-cols-2 gap-3">
              <label class="block">
                <span class="text-sm font-medium text-slate-500">日期</span>
                <input
                  class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 text-[16px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10"
                  name="date" type="date">
              </label>
              <label class="block">
                <span class="text-sm font-medium text-slate-500">體重</span>
                <input
                  class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 text-[16px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10"
                  name="weight" type="number" step="0.1" placeholder="kg">
              </label>
            </div>
            <div class="mt-3 grid grid-cols-2 gap-3">
              <label class="block">
                <span class="text-sm font-medium text-slate-500">收縮壓</span>
                <input
                  class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 text-[16px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10"
                  name="bpSystolic" type="number" placeholder="mmHg">
              </label>
              <label class="block">
                <span class="text-sm font-medium text-slate-500">舒張壓</span>
                <input
                  class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 text-[16px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10"
                  name="bpDiastolic" type="number" placeholder="mmHg">
              </label>
            </div>
            <label class="mt-3 block">
              <span class="text-sm font-medium text-slate-500">備註</span>
              <textarea
                class="mt-1 w-full resize-none rounded-md border border-slate-200 px-3 py-2 text-[16px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10"
                name="notes" rows="4" placeholder="記錄當日狀態或補充事項"></textarea>
            </label>
            <button
              class="mt-4 w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600/20"
              type="submit">儲存每日紀錄</button>
          </form>

          <form id="bloodReportForm" class="rounded-lg border border-slate-200 bg-white p-4">
            <div>
              <h2 class="text-base font-semibold text-slate-900">專業血液報告</h2>
              <p class="mt-1 text-sm text-slate-500">輸入血液檢查數值</p>
            </div>
            <div id="bloodFields" class="mt-4 grid grid-cols-2 gap-3 md:grid-cols-3"></div>
            <button
              class="mt-4 w-full rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600/20"
              type="submit">儲存血液報告</button>
          </form>
        </div>
      </section>

      <section id="settingsView" class="view hidden space-y-5">
        <div class="rounded-lg border border-slate-200 bg-white p-4">
          <h2 class="text-base font-semibold text-slate-900">設定</h2>
          <div class="mt-4 grid gap-3 md:grid-cols-2">
            <label class="block">
              <span class="text-sm font-medium text-slate-500">GAS API URL</span>
              <input id="gasUrl"
                class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 text-[16px] outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-600/10"
                type="url" placeholder="https://script.google.com/macros/s/.../exec">
            </label>
          </div>
          <button id="saveSettings"
            class="mt-4 rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-600/20"
            type="button">儲存設定</button>
        </div>
      </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 z-20 grid grid-cols-3 border-t border-slate-200 bg-white md:hidden"
      aria-label="手機導覽">
      <button class="mobile-nav active py-3 text-sm font-medium" data-view="dashboard" type="button">首頁</button>
      <button class="mobile-nav py-3 text-sm font-medium text-slate-500" data-view="logs" type="button">紀錄</button>
      <button class="mobile-nav py-3 text-sm font-medium text-slate-500" data-view="settings" type="button">設定</button>
    </nav>

    <section id="confirmDialog" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/40 px-4" role="dialog" aria-modal="true" aria-labelledby="confirmDialogTitle">
      <div class="w-full max-w-md rounded-lg border border-slate-200 bg-white shadow-xl">
        <div class="border-b border-slate-200 px-4 py-3">
          <h2 id="confirmDialogTitle" class="text-base font-semibold text-slate-900">確認資料</h2>
          <p id="confirmDialogDescription" class="mt-1 text-sm text-slate-500">請確認以下資料是否正確。</p>
        </div>
        <div id="confirmDialogContent" class="max-h-[60vh] overflow-y-auto px-4 py-3 text-sm"></div>
        <div class="flex justify-end gap-2 border-t border-slate-200 px-4 py-3">
          <button id="cancelConfirmDialog" class="rounded-md border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50" type="button">取消</button>
          <button id="acceptConfirmDialog" class="rounded-md bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700" type="button">確認儲存</button>
        </div>
      </div>
    </section>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pwa.js"></script>
</body>

</html>
